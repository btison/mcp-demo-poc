global:
  kafka:
    name: &kafka kafka
    namespace: &kafkanamespace kafka
    kafka-cluster: &kafkacluster
      bootstrapServer: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      securityProtocol: SASL_PLAINTEXT
      saslMechanism: SCRAM-SHA-512
      clientId: globex
      clientSecret: globex

amqstreams:
  enabled: true
  applicationName: amqstreams
  applicationNamespace: openshift-gitops
  destinationNamespace: kafka
  source:
    repoUrl: https://github.com/quarkus-mcp-demo/mcp-demo-poc.git
    targetRevision: main
    path: install/helm/amq-streams
    helm:
      values:
        kafka:
          enabled: true
        console:
          enabled: true

        kafka-broker:
          namespace: *kafkanamespace
          nameOverride: *kafka
          kafka:
            controller:
              enabled: true
            listener:
              external:
                tls:
                  secret:
                    value:
                      crt: 
                      key: 
          authentication:
            clientId: admin
            clientSecret: adminpassword
            securityProtocol: SASL_PLAINTEXT
            saslMechanism: SCRAM-SHA-512
        amq-streams-console:
          namespace: *kafkanamespace
          subdomain: 
          kafka:
            name: *kafka
            namespace: *kafkanamespace
            authentication:
              securityProtocol: SASL_SSL
              saslMechanism: SCRAM-SHA-512
            authorization: simple
        kafka-topics:
          kafka:
            namespace: *kafkanamespace
            cluster: *kafka
  argocd:
    enabled: true
    syncwave: "1"

keycloak:
  enabled: true
  applicationName: keycloak
  applicationNamespace: openshift-gitops
  destinationNamespace: keycloak
  source:
    repoUrl: https://github.com/quarkus-mcp-demo/mcp-demo-poc.git
    targetRevision: main
    path: install/helm/keycloak
    helm:
      values:
        keycloak:
          nameOverride: keycloak
          route:
            host:
          ingress:
            enabled: false
  argocd:
    enabled: true
    syncwave: "1"

globex:
  enabled: true
  applicationName: globex
  applicationNamespace: openshift-gitops
  destinationNamespace: globex
  source:
    repoUrl: https://github.com/quarkus-mcp-demo/mcp-demo-poc.git
    targetRevision: main
    path: install/helm/globex
    helm:
      values:
        kafka-broker:
          namespace: *kafkanamespace
          nameOverride: *kafka

        kafka-topics:
          kafka:
            namespace: *kafkanamespace
            cluster: *kafka
        globex-db:
          pgsql:
            adminPassword: adminpassword

        keycloak-realmimport-globex:
          namespace: keycloak
          keycloak:
            name: keycloak
          realm:
            name: globex
          client:
            gateway:
              name: globex-web-gateway

        globex-web:
          sso:
            authServer:
            realm: globex
            client: globex-web-gateway
          subdomain:

        activity-tracking:
          kafka:
            <<: *kafkacluster

        recommendation-engine:
          kafka:
            <<: *kafkacluster

        globex-agent:
          oidc:
            realm: globex
            clientId: globex-web-gateway
          mcp:
            globexStore:
              url: http://globex-store-mcp:8080/mcp
              logRequests: true
              logResponses: true
            complaints:
              url: http://globex-complaints:8080/mcp
              logRequests: true
              logResponses: true
          otel:
            exporter:
              endpoint: http://otel.lgtm.svc.cluster.local:4317

        globex-complaints:
          otel:
            exporter:
              endpoint: http://otel.lgtm.svc.cluster.local:4317

        globex-store-mcp:
          otel:
            exporter:
              endpoint: http://otel.lgtm.svc.cluster.local:4317

  argocd:
    enabled: true
    syncwave: "3"

lgtm:
  enabled: true
  applicationName: lgtm
  applicationNamespace: openshift-gitops
  destinationNamespace: lgtm
  source:
    repoUrl: https://github.com/quarkus-mcp-demo/mcp-demo-poc.git
    targetRevision: main
    path: install/helm/lgtm
    helm:
      values:
        grafana:
          route:
            host:
        tempo:
          tempo:
            storage:
              trace:
                s3:
                  access_key:
                  secret_key:
        mimir:
          minio:
            rootUser: 
            rootPassword:
        loki:
          loki:
            storage:
              type: s3
              s3:
                access_key_id: 
                secret_access_key: 

  argocd:
    enabled: true
    syncwave: "2"

minio:
  enabled: true
  applicationName: minio
  applicationNamespace: openshift-gitops
  destinationNamespace: lgtm
  source:
    repoUrl: https://github.com/quarkus-mcp-demo/mcp-demo-poc.git
    targetRevision: main
    path: install/helm/minio
    helm:
      values:
        minio:
          rootUser:
          rootPassword: 
          securityContext:
            enabled: false
  argocd:
    enabled: true
    syncwave: "1"

contextforge:
  enabled: true
  applicationName: contextforge
  applicationNamespace: openshift-gitops
  destinationNamespace: contextforge
  source:
    repoUrl: https://github.com/IBM/mcp-context-forge
    targetRevision: main
    path: charts/mcp-stack
    helm:
      values:
        mcpContextForge:
          replicaCount: 1
          hpa:
            enabled: false
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 768Mi
          metrics:
            enabled: false
          config:
            ENVIRONMENT: production          # deployment environment (development/staging/production)
            APP_DOMAIN:
            CORS_ENABLED: "true"             # enable CORS processing in gateway
            CORS_ALLOW_CREDENTIALS: "true"   # allow credentials in CORS requests
            ALLOWED_ORIGINS:
            SKIP_SSL_VERIFY: "false"         # skip TLS certificate verification on upstream calls
            ENABLE_METRICS: "true"
          secret:
            BASIC_AUTH_PASSWORD: contextforge          # password for basic-auth (CHANGE IN PROD!)
            JWT_SECRET_KEY:
            AUTH_ENCRYPTION_SECRET:
            PLATFORM_ADMIN_PASSWORD: contextforge     # password for bootstrap platform admin user
            REQUIRE_STRONG_SECRETS: "false" 
            DEFAULT_USER_PASSWORD: contextforge       # default password for new users (bootstrap)
            ADMIN_REQUIRE_PASSWORD_CHANGE_ON_BOOTSTRAP: "false"
            REQUIRE_PASSWORD_CHANGE_FOR_DEFAULT_PASSWORD: "false" # require change for default password
            PASSWORD_POLICY_ENABLED: "false"         # enable password policy enforcement
            PASSWORD_PREVENT_REUSE: "false"
            MIN_PASSWORD_LENGTH: "8"              # minimum password length for validation
            MIN_SECRET_LENGTH: "32"                # minimum secret key length for validation
          ingress:
            enabled: false
          pluginConfig:
            enabled: true
            plugins: |
              plugin_dirs:
                - "plugins/native"
                - "plugins/custom"
              plugin_settings:
                parallel_execution_within_band: true
                plugin_timeout: 120
                fail_on_plugin_error: false
                enable_plugin_api: true
                plugin_health_check_interval: 120
                include_user_info: false
              plugins:
                - name: "PIIFilterPlugin"
                  kind: "cpex_pii_filter.PIIFilterPlugin"
                  description: "Detects and masks Personally Identifiable Information"
                  version: "0.1.0"
                  author: "Mihai Criveti"
                  hooks: ["prompt_pre_fetch", "prompt_post_fetch", "tool_pre_invoke", "tool_post_invoke"]
                  tags: ["security", "pii", "compliance", "filter", "gdpr", "hipaa"]
                  mode: "enforce"
                  priority: 50
                  conditions:
                    - prompts: []
                      server_ids: []
                      tenant_ids: []
                  config:
                    detect_ssn: true
                    detect_credit_card: true
                    detect_email: true
                    detect_phone: false
                    detect_ip_address: false
                    default_mask_strategy: "partial"
                    redaction_text: "[PII_REDACTED]"
                    block_on_detection: false
                    log_detections: true
                    include_detection_details: true
                    whitelist_patterns:
                      - "test@example.com"
                      - "555-555-5555"
                - name: "SecretsDetection"
                  kind: "cpex_secrets_detection.SecretsDetectionPlugin"
                  description: "Detects keys/tokens/secrets in inputs/outputs; optional redaction/blocking"
                  version: "0.1.0"
                  author: "ContextForge"
                  hooks: ["prompt_pre_fetch", "tool_post_invoke", "resource_post_fetch"]
                  tags: ["security", "secrets", "dlp"]
                  mode: "enforce"
                  priority: 51
                  conditions: []
                  config:
                    enabled:
                      aws_access_key_id: true
                      aws_secret_access_key: true
                      google_api_key: true
                      slack_token: true
                      private_key_block: true
                      jwt_like: true
                      hex_secret_32: true
                      base64_24: false
                    redact: true
                    redaction_text: "***REDACTED***"
                    block_on_detection: false
                    min_findings_to_block: 1
        migration:
          hookPhase: "post-install"
          hostKey: "host"
          portKey: "port"
        postgres:
          enabled: true
          persistence:
            enabled: true
          credentials:                  # used only when existingSecret is blank
            database: postgresdb
            user: admin
            password: test123
        pgbouncer:
          enabled: false
        redis:
          enabled: true
          image:
            repository: docker.io/library/redis
            tag: "7"
          persistence:
            enabled: true               # Set to true to enable Redis persistence
            storageClassName: ""         # Use empty string for default StorageClass
            volumeName: ""               # Pin to a specific PV by name (optional). When set, the PVC binds to that PV.
            accessModes: [ReadWriteOnce]
            size: 1Gi
            reclaimPolicy: Retain        # Retain prevents data loss when PVC is deleted (manual cleanup required after uninstall)
            annotations: {}              # Optional annotations for backup tools
        route:
          enabled: true
          host: ""
          tls:
            termination: edge
        mcpFastTimeServer:
          enabled: true            # switch to true to deploy
          replicaCount: 1
          ingress:
            enabled: false

  argocd:
    enabled: true
    syncwave: "2"    
