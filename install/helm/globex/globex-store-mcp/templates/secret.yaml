apiVersion: v1
kind: Secret
metadata:
  name: {{ include "globex-store-mcp.name" . }}
  labels:
    {{- include "globex-store-mcp.labels" . | nindent 4 }}
  annotations:
    {{- include "globex-store-mcp.argocd-syncwave" . | nindent 4 }}
type: "Opaque"
stringData:
  application.properties: |-

    quarkus.otel.enabled={{ .Values.otel.enabled }}
    quarkus.otel.logs.enabled={{ .Values.otel.logs.enabled }}
    quarkus.otel.traces.enabled={{ .Values.otel.traces.enabled }}
    quarkus.otel.metrics.enabled={{ .Values.otel.metrics.enabled }}
    quarkus.otel.exporter.otlp.endpoint={{ .Values.otel.exporter.endpoint }}
    quarkus.otel.exporter.otlp.metrics.endpoint={{ .Values.otel.exporter.endpoint }}
